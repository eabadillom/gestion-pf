<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">
    <h:form id="topbarForm">
	    <div class="topbar">
	        <div id="topbar-left">
	            <a id="omega-menu-button" href="#">
	                <span class="pi pi-bars"/>
	            </a>
	            <span class="topbar-title"><ui:insert name="title"/></span>
	        </div>
			<a id="options-menu-button" href="#">
	            <span class="pi pi-ellipsis-h"/>
	        </a>
	        <div id="topbar-icons">
	        	<span style="padding-left: 0.5rem; padding-right: 0.5rem;">
	        		<p:commandLink action="#{sideBarBean.redirectOrdenEntrada()}" title="Ordenes de entrada pendientes">
			        	<p:badge value="#{sideBarBean.numeroEntradas}" severity="danger" rendered="#{sideBarBean.numeroEntradas != null}">
				       	</p:badge>
	        		</p:commandLink>
		        </span>
	        	<span style="padding-left: 0.5rem; padding-right: 0.5rem;">
		       		<p:commandLink action="#{sideBarBean.redirectOrdenesSalida()}" title="Ordenes de retiro pendientes">
				       	<p:badge id="numeroSalidas" value="#{sideBarBean.numeroSalidas}" severity="#{sideBarBean.severity}" rendered="#{sideBarBean.numeroSalidas != null}" >
				       		<i class="pi pi-sign-out" style="font-size: 1.5rem"/>
				       	</p:badge>
		       		</p:commandLink>
		        </span>
		        <span style="padding-left: 0.5rem; padding-right: 0.5rem;">
		        	<p:graphicImage name="images/user.png" library="omega-layout" height="30" rendered="#{empty sideBarBean.fotografia}"/>
					<h:graphicImage value="#{sideBarBean.fotografia}" style="border-radius: 30%;width: auto; height: 30px;" rendered="#{not empty sideBarBean.fotografia}"/>
		        </span>
	            <!-- <a href="#">
	                <span class="topbar-item-text">User</span>
	                <span class="topbar-icon pi pi-user"/>
	            </a> -->
	        </div>
	        
	    </div>
    </h:form>
</ui:composition>
