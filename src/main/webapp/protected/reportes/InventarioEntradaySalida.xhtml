<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/WEB-INF/template.xhtml">
	<ui:define name="title">Entradas vs Salidas</ui:define>
	<ui:define name="content">
		<h:form id="form">
                    <!-- Controles comunes: Notificaciones, Dialogo "STATUS" y Dialogo Confirmar (Global) -->
                    <ui:include src="/protected/common/status-info.xhtml" />
                    <p:panel id="pnl-datos-generales" header="DATOS GENERALES" >
                        <div class="p-grid ui-fluid">
                            <div class="p-col-12 p-md-5">
                                <p:outputLabel for="ol-fechaIni" value="Del" />
                                <p:datePicker id="ol-fechaIni" showIcon="true" value="#{reporteEntradaSalidaBean.fecha_ini}" maxdate="#{reporteEntradaSalidaBean.maxDate}">
                                    <p:ajax process="@this" />
                                    <f:convertDateTime pattern="dd/MM/yyyy" locale="es" timeZone="GMT-6:00"/>
                                </p:datePicker>
                            </div>
                            <div class="p-col-12 p-md-5">
                                <p:outputLabel for="ol-fechafin" value="al" />
                                <p:datePicker id="ol-fechafin" showIcon="true" value="#{reporteEntradaSalidaBean.fecha_fin}" maxdate="#{reporteEntradaSalidaBean.maxDate}">
                                    <p:ajax process="@this" />
                                    <f:convertDateTime pattern="dd/MM/yyyy" locale="es" timeZone="GMT-6:00"/>
                                </p:datePicker>
                            </div>
                        </div>
                        <div class="p-grid ui-fluid">
                            <div class="p-col-12 p-md-5">
                                <p:outputLabel for="Cliente" value="Cliente" />
                                <p:selectOneMenu id="Cliente" value="#{reporteEntradaSalidaBean.clienteSelect}" converter="entityConverter" filter="true" filterMatchMode="contains">
                                    <f:selectItem itemLabel="Todos los clientes	" noSelectionOption="true" />
                                    <f:selectItems value="#{reporteEntradaSalidaBean.listaClientes}" var="cliente" itemLabel="#{cliente.nombre}#{cliente.alias == null ? '' : ' ('.concat(cliente.alias).concat(')')}" itemValue="#{cliente}" />
                                    <p:ajax process="@this" />
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="p-grid ui-fluid p-col-12">
                            <div class="p-col-12 p-md-3">
                                <p:commandButton value="PDF" icon="pi pi-file-pdf" actionListener="#{reporteEntradaSalidaBean.exportarPdf}" process="@this" ajax="false" styleClass="ui-button-raised ui-button-secondary" >
                                    <p:fileDownload value="#{reporteEntradaSalidaBean.file}" />
                                </p:commandButton>
                            </div>
                            <div class="p-col-12 p-md-3">
                                <p:commandButton value="Excel" icon="pi pi-file-excel" actionListener="#{reporteEntradaSalidaBean.exportarExcel}" process="@this" ajax="false" styleClass="ui-button-raised ui-button-secondary" >
                                    <p:fileDownload value="#{reporteEntradaSalidaBean.file}" />
                                </p:commandButton>
                            </div>
                            <div class="p-col-12 p-md-3">
                                <p:outputLabel value="." style="color: rgba(255, 255, 255, 0);" />
                            </div>
                        </div>
                    </p:panel>
		</h:form>
	</ui:define>
</ui:composition>
