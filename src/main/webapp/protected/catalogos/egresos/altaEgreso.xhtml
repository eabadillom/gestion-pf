<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Egreso</ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:growl id="messages" showDetail="true" />
            <p:dialog modal="true" widgetVar="statusInfoDialog" header="Cargando información..." draggable="false"
                      closable="false" resizable="false">
                <div align="center">
                    <i class="pi pi-spinner pi-spin" style="font-size:3rem;"></i>
                </div>
            </p:dialog>

            <p:panel header="Datos Generales" styleClass="mb-4">
                <div class="fromgrid grid">
                    <div class="field col-12 md:col-4">
                        <p:outputLabel for="fhEgreso" value="fecha"/>
                        <p:datePicker id="fhEgreso" 
                                      value="#{altaEgresoBean.egresoSelected.fecha}"
                                      pattern="dd/MM/yyyy"
                                      required="true"/>
                    </div>

                    <div class="field col-12 md:col-4">
                        <p:outputLabel for="toEgreso" value="Total"/>
                        <p:inputNumber 
                            id="toEgreso"
                            value="#{altaEgresoBean.egresoSelected.monto}"
                            decimalPlaces="2"
                            symbol="$ "
                            required="true"/>
                    </div>

                    <div class="field cold-12 md:col-4">
                        <p:outputLabel for="cdCategoria" value="Categoría"/>

                        <p:selectOneMenu
                            id="cdCategoria"
                            value="#{altaEgresoBean.egresoSelected.categoria}"
                            converter="entityConverter"
                            required="true">

                            <f:selectItem itemLabel="Seleccione" itemValue="#{null}"/>

                            <f:selectItems
                                value="#{altaEgresoBean.lstCategoriasEgreso}"
                                var="c"
                                itemLabel="#{c.descripcion}"
                                itemValue="#{c}"/>

                        </p:selectOneMenu>
                    </div>
                </div>
            </p:panel>

            <p:panel header="Concepto" styleClass="mb-4">

                <div class="field">

                    <p:inputTextarea
                        id="concepto"
                        value="#{altaEgresoBean.egresoSelected.concepto}"
                        rows="4"
                        maxlength="150"
                        counter="contador"
                        autoResize="false"
                        required="true"
                        style="width:100%"/>

                    <h:outputText id="contador"/>

                </div>

            </p:panel>

            <p:panel header="Información de Pago" styleClass="mb-4">

                <div class="formgrid grid">

                    <!-- Método de pago -->

                    <div class="field col-12 md:col-4">

                        <p:outputLabel
                            for="metodoPago"
                            value="Método de Pago"/>

                        <p:selectOneMenu
                            id="metodoPago"
                            value="#{altaEgresoBean.egresoSelected.metodoPago}"
                            converter="entityConverter"
                            required="true">

                            <f:selectItem itemLabel="Seleccione" itemValue="#{null}"/>

                            <f:selectItems
                                value="#{altaEgresoBean.lstMetodosPago}"
                                var="m"
                                itemLabel="#{m.nbMetodoPago}"
                                itemValue="#{m}"/>

                        </p:selectOneMenu>

                    </div>

                    <!-- Forma de pago -->

                    <div class="field col-12 md:col-4">

                        <p:outputLabel
                            for="formaPago"
                            value="Forma de Pago"/>

                        <p:selectOneMenu
                            id="formaPago"
                            value="#{altaEgresoBean.egresoSelected.formaPago}"
                            converter="entityConverter"
                            required="true">

                            <f:selectItem itemLabel="Seleccione" itemValue="#{null}"/>

                            <f:selectItems
                                value="#{altaEgresoBean.lstMediosPago}"
                                var="fp"
                                itemLabel="#{fp.mpDescripcion}"
                                itemValue="#{fp}"/>

                        </p:selectOneMenu>

                    </div>

                    <!-- Emisor -->

                    <div class="field col-12 md:col-4">

                        <p:outputLabel
                            for="emisor"
                            value="Emisor"/>

                        <p:selectOneMenu
                            id="emisor"
                            value="#{altaEgresoBean.egresoSelected.emisor}"
                            converter="entityConverter"
                            required="true">

                            <f:selectItem itemLabel="Seleccione" itemValue="#{null}"/>

                            <f:selectItems
                                value="#{altaEgresoBean.lstEmisoresCfdi}"
                                var="e"
                                itemLabel="#{e.nb_emisor}"
                                itemValue="#{e}"/>

                        </p:selectOneMenu>

                    </div>

                </div>

            </p:panel> 
            <p:panel header="Referencia" styleClass="mb-4">

                <div class="field">

                    <p:inputText
                        id="referencia"
                        value="#{altaEgresoBean.egresoSelected.referencia}"
                        maxlength="100"
                        style="width:100%"/>

                </div>

            </p:panel>
        </h:form>
    </ui:define>

</ui:composition>
