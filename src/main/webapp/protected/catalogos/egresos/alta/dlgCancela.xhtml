<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <p:dialog id="dlgMotiCance" 
              header="Motivación de cancelación" 
              showEffect="fade" 
              modal="false" 
              widgetVar="dlgMotiCance" 
              responsive="true" 
              position="center center"
              width="30rem" 
              resizable="false" 
              dynamic="true">
        <h:panelGrid columns="1">
            <p:outputLabel for="motivo" value="Motivo:" style="width:100%; align-content: center"/>
            <p:inputTextarea
                id="motivo"
                value="#{altaEgresoBean.cancelaEgresoSelected.motivo}"
                rows="4"
                maxlength="255"
                counter="contador"
                autoResize="false"
                required="true"
                placeholder="" 
                style="width:100%; resize: none; align-content: center">
                <p:ajax process="@this"/>

            </p:inputTextarea>
        </h:panelGrid>

        <f:facet name="footer">
            <p:commandButton id="btnGuardarConCance"
                             value="Guardar"
                             icon="pi pi-save"
                             actionListener="#{altaEgresoBean.procesarEgreso('si')}"
                             process="@this"
                             onstart="PF('statusInfoDialog').show()"
                             oncomplete="if(args.exito){
                             PF('dlgCancela').hide();
                             } PF('statusInfoDialog').hide()">
            </p:commandButton>
            <p:commandButton id="btnCancelar"
                             value="Cancelar" icon="pi pi-times" onclick="PF('clienteDireccionesActDialog').hide()"
                             class="ui-button-secondary"  resetValues="true" immediate="true" process="@this">
            </p:commandButton>
        </f:facet>

    </p:dialog>
</ui:composition>
