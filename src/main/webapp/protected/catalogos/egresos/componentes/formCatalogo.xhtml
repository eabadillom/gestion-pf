<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <p:dialog widgetVar="dlg" modal="true">

        <h:panelGrid columns="2">

            <h:outputLabel value="Clave" />
            <p:inputText value="#{bean.nuevo.clave}" />

            <h:outputLabel value="Nombre" />
            <p:inputText value="#{bean.nuevo.nombre}" />

            <h:outputLabel value="Descripción" />
            <p:inputTextarea value="#{bean.nuevo.descripcion}" />

            <h:outputLabel value="Orden" />
            <p:inputText value="#{bean.nuevo.orden}" />

        </h:panelGrid>

        <p:commandButton value="Guardar"
                         actionListener="#{bean.guardar}"
                         update=":formCatalogo"
                         oncomplete="PF('dlg').hide()" />

    </p:dialog>

</ui:composition>
