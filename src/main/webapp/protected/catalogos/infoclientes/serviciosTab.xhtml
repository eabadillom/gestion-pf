<!-- servicios-tab.xhtml -->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <div>
        <p:commandButton id="sevicioAdd"
                         icon="pi pi-plus"
                         value="Nuevo servicio"
                         actionListener="#{clientesBean.nuevoPrecioServicio()}"
                         process="@this"
                         update="form:tabView:dlgPrecioServicio form:tabView:dlgPrecioServicio"
                         oncomplete="PF('dlgPrecioServicio').show()"
                         styleClass="ui-button-raised"
                         style="margin-right: .5rem; width: auto;"
                         disabled="#{clientesBean.clienteSelected == null}" />
    </div>



    <p:dataTable id="dtPreciosServicios" widgetVar="dtPreciosServicios" value="#{clientesBean.lstPrecioServicios}" rowKey="#{pServicio.id}"
                 var="pServicio" paginator="true"
                 rows="6" paginatorPosition="bottom">

        <p:column headerText="Servicio" sortBy="#{pServicio.servicio.servicioDs}">
            <h:outputText value="#{pServicio.servicio.servicioDs}" />
        </p:column>
        <p:column headerText="Unidad" sortBy="#{pServicio.unidad.unidadDeManejoDs}" width="7rem" style="text-align: center;">
            <h:outputText value="#{pServicio.unidad.unidadDeManejoDs}" />
        </p:column>
        <p:column headerText="Precio" sortBy="#{pServicio.precio}" width="6rem" style="text-align: right;">
            <h:outputText value="#{pServicio.precio}">
                <f:convertNumber type="currency" maxFractionDigits="2" />
            </h:outputText>
        </p:column>
        <p:column width="2rem" style="text-align: center;">
            <p:commandButton icon="pi pi-pencil" process="@this" styleClass="edit-button" oncomplete="PF('dlgPrecioServicio').show()"
                             update="form:tabView:dlgPrecioServicio form:tabView:dlgPrecioServicio" action="#{clientesBean.editarPrecioServicio(pServicio)}">
            </p:commandButton>
        </p:column>
        <p:column width="2rem" style="text-align: center;">
            <p:commandButton class="ui-button-danger" icon="pi pi-trash" process="@this" oncomplete="PF('deleteServicioDialog').show()">
                <f:setPropertyActionListener value="#{pServicio}" target="#{clientesBean.precioServicioSelected}" />
            </p:commandButton>
        </p:column>
    </p:dataTable>

    <p:dialog id="dlgPrecioServicio" header="#{(clientesBean.precioServicioSelected.id != null) ? 'Actualizar' : 'Agregar'} Precio Servicio" showEffect="fade" modal="false" widgetVar="dlgPrecioServicio" responsive="true" position="center center"
              width="30rem" resizable="false" dynamic="true">
        <div class="p-grid">
                 <div class="p-col-12 p-md-12">
                    <p:outputLabel>Cliente</p:outputLabel>
                    <p:inputText value="#{clientesBean.clienteSelected.nombre}" disabled="true" />
                </div>
                 <div class="p-col-12 p-md-12">
                    <p:outputLabel for="servicio" value="Servicio"/>
                    <p:selectOneMenu id="servicio" value="#{clientesBean.precioServicioTemporal.servicio}" filter="true" filterMatchMode="contains"
                                     converter="entityConverter" required="true" requiredMessage="Seleccione servicio" 
                                     disabled="#{clientesBean.precioServicioTemporal.id ne null}" style="width:100%">
                        <f:selectItem itemLabel="--Selecciona--" itemValue="#{null}" />
                        <f:selectItems value="#{clientesBean.lstServicio}" var="serv" itemLabel="#{serv.servicioDs}" itemValue="#{serv}"/>
                        <p:ajax process="@this" event="change"/>
                    </p:selectOneMenu>
                </div>
                 <div class="p-col-12 p-md-12">
                    <p:outputLabel for="unidad" value="Unidad"/>
                    <p:selectOneMenu id="unidad" value="#{clientesBean.precioServicioTemporal.unidad}" filter="true" filterMatchMode="contains"
                                     converter="entityConverter" required="true" requiredMessage="Seleccione unidad"
                                     disabled="#{clientesBean.precioServicioTemporal.id ne null}" style="width:100%">
                        <f:selectItem itemLabel="--Selecciona--" itemValue="#{null}"/>
                        <f:selectItems value="#{clientesBean.lstUnidadManejo}" var="unidad" itemLabel="#{unidad.unidadDeManejoDs}" itemValue="#{unidad}" />
                        <p:ajax process="@this" event="change" />
                    </p:selectOneMenu>
                </div>
                 <div class="p-col-12 p-md-12">
                    <p:outputLabel for="precio" value="Precio"/>
                    <p:inputNumber id="precio" value="#{clientesBean.precioServicioTemporal.precio}" emptyValue="null" symbol="$ " symbolPosition="p" thousandSeparator="," inputStyle="text-align: right"
                                   minValue="0" required="true" requiredMessage="Campo requerido" style="width:100%">
                        <p:ajax process="@this"/>
                    </p:inputNumber>
                </div>
        </div>

        <f:facet name="footer">
            <p:commandButton value="#{(clientesBean.precioServicioSelected.id != null) ? 'Actualizar' : 'Agregar'}" icon="pi pi-check" actionListener="#{clientesBean.operarServicios('agregarprecioservicio')}"
                             process="@this" onstart="PF('statusInfoDialog').show()" oncomplete="PF('statusInfoDialog').hide()" resetValues="true"/>
            <p:commandButton value="Cancelar" icon="pi pi-times" oncomplete="PF('dlgPrecioServicio').hide()" class="ui-button-secondary" immediate="true"/>
        </f:facet>
    </p:dialog>

    <p:dialog header="Confirmar eliminación"
              widgetVar="deleteServicioDialog"
              modal="false"
              closable="false"
              resizable="false"
              draggable="false"
              width="400"
              showEffect="fade"
              hideEffect="fade"
              dynamic="true">

        <h:outputText value="¿Desea eliminar el servicio?" style="font-size: 16px;" />

        <p:spacer height="20" />

        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <p:commandButton value="Sí"
                             icon="pi pi-check"
                             styleClass="ui-button-danger"
                             actionListener="#{clientesBean.operarServicios('eliminarprecioservicio')}"
                             update="dtPreciosServicios"
                             oncomplete="PF('deleteServicioDialog').hide()" process="@this"  resetValues="true"/>

            <p:commandButton value="No"
                             type="button"
                             icon="pi pi-times"
                             styleClass="ui-button-secondary"
                             onclick="PF('deleteServicioDialog').hide()" />
        </div>
    </p:dialog>
</ui:composition>
