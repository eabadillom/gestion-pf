<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <p:dataTable id="dtBitacora" widgetVar="dtBitacora" value="#{bitacoraBean.grupos}" var="grupo"
                 rowKey="#{grupo.idUsuario}" reflow="true" paginator="true" rows="10" rowSelectMode="add"
                 paginatorPosition="bottom" lazy="false">
        <p:column headerText="Folio">
            <p:outputLabel value="#{grupo.documento}"/>
        </p:column>
        <p:column headerText="Documento">
            <p:outputLabel value="#{grupo.nombrePantalla}"/>
        </p:column>
        <p:column headerText="Tipo operación">
            <p:outputLabel value="#{grupo.tipoPantalla}"/>
        </p:column>
        <p:column headerText="Empleado">
            <p:outputLabel value="#{bitacoraBean.nombreCompleto(grupo)}"/>
        </p:column>
        <p:column headerText="Día">
            <h:outputText value="#{bitacoraBean.getSoloFecha(grupo.momento)}"/>
        </p:column>
        <p:column>
            <p:commandButton  id="detalle" value="Operaciones" 
                             icon="pi pi-bars"
                             process="@this"
                             onstart="PF('statusInfoDialog').show()" 
                             oncomplete="PF('statusInfoDialog').hide(); PF('dlgEventos').show()"
                             actionListener="#{bitacoraBean.obternerDatellerGrupo(grupo)}"
                             update="form:dlgEventos"/>
        </p:column>

    </p:dataTable>

</ui:composition>
