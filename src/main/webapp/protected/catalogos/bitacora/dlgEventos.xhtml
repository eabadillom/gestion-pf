<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <p:dialog id="dlgEventos" widgetVar="dlgEventos"
              header="Eventos Sucedidos"
              showEffect="fade"
              modal="true" responsive="true" position="center top" width="100%">
        <p:panel header="#{bitacoraBean.nombreCompleto(bitacoraBean.grupoSelected)}" styleClass="ui-fluid">
            <div class="p-grid">
                <div class="p-col-12 p-md-4">
                    <p:outputLabel value="#{bitacoraBean.getSoloFecha(bitacoraBean.grupoSelected.momento)}"/>
                </div>
                <div class="p-col-12 p-md-4">
                    <p:outputLabel value="#{bitacoraBean.grupoSelected.documento}"/>
                </div>
                <div class="p-col-12 p-md-4">
                    <p:outputLabel value="#{bitacoraBean.grupoSelected.tipoPantalla} DE "/>
                    <p:outputLabel value="#{bitacoraBean.grupoSelected.nombrePantalla}"/>
                </div>

                <div class="p-col-12 p-md-12">
                    <p:dataTable id="dtEventos" widgetVar="dlgEventos" value="#{bitacoraBean.eventos}" var="evento"
                                 rowKey="#{evento.id}" reflow="true" paginator="true" rows="7" rowSelectMode="add"
                                 paginatorPosition="bottom" lazy="false">
                        <p:column headerText="Hora">
                            <p:outputLabel value="#{evento.hora}"/>
                        </p:column>
                        <p:column headerText="Descripcion">
                            <p:outputLabel value="#{evento.descripcion}"/>
                        </p:column>
                    </p:dataTable>
                </div>

            </div> 
        </p:panel>
    </p:dialog>
</ui:composition>
