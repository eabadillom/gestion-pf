<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    
    	<p:dialog widgetVar="dialogCargaError" header="Error en la solicitud" showEffect="fade" modal="true" responsive="true" closable="true">
    		<p:outputLabel value="Primero debe confirmar una orden de retiro."></p:outputLabel>
    		<f:facet name="footer">
    			<p:commandButton value="Cerrar" icon="pi pi-times" onclick="PF('dialogCargaError').hide();" />
    		</f:facet>
    	</p:dialog>

		<p:dialog widgetVar="dialogCarga" header="Adjuntar archivos" showEffect="fade" modal="true" responsive="true" width="600">
			<p:panel id="pnlCarga" class="ui-fluid">
				<div class="p-grid ui-fluid p-col-12">
					<div class="p-col-12 p-md-12">
						<p:fileUpload value="#{ordenSalidaBean.attachmentFile}" label="Seleccione un archivo" mode="simple" skinSimple="true" uploadIcon="pi pi-upload"/>
					</div>
					<div class="p-col-6 p-md-6">
						<p:commandButton value="Agregar" icon="pi pi-check" actionListener="#{ordenSalidaBean.cargarArchivo}" process="@this pnlCarga" update="pnlCarga form:pnl-datos-generales" styleClass="mt-3 ui-button-outlined block"/>
					</div>
				</div>
				<div class="p-grid">
					<p:dataTable id="dt-adjuntos" value="#{ordenSalidaBean.archivosList}" var="archivo">
						<p:column headerText="Nombre" footerText="#{ordenSalidaBean.archivosList.size()} archivo#{ordenSalidaBean.archivosList.size() != 1 ? 's' : ''}" >
							<p:outputLabel value="#{archivo.nombreArchivo}" />
						</p:column>
						<p:column headerText="Tamaño (MB)" footerText="#{ordenSalidaBean.tamanioTotal} MB" width="8rem">
							<p:outputLabel value="#{archivo.tamanio / 1048576}">
								<f:convertNumber pattern="#0.00" />
							</p:outputLabel>
						</p:column>
						<p:column width="2rem">
						    <p:commandButton class="ui-button-danger" icon="pi pi-times" action="#{ordenSalidaBean.eliminarAdjunto}" update="dt-adjuntos" onerror="">
						        <f:setPropertyActionListener value="#{archivo}" target="#{ordenSalidaBean.selectedAttachment}"/>
						    </p:commandButton>
						</p:column>
					</p:dataTable>
				</div>
			</p:panel>
			<f:facet name="footer">
					<p:commandButton value="Notificar" icon="pi pi-send" actionListener="#{ordenSalidaBean.notificar()}" onstart="PF('statusInfoDialog').show();" oncomplete="PF('statusInfoDialog').hide();"/>
					<p:commandButton value="Cerrar" icon="pi pi-times" class="ui-button-secondary" onclick="PF('dialogCarga').hide();" />
				</f:facet>
		</p:dialog>


</ui:composition>
