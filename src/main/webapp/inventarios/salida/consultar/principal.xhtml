    <ui:define name="content">
    	<h:outputScript>
			//<![CDATA[
			function iniciarCamara() {
				setTimeout(function() {
					if (typeof PF('camera') !== 'undefined') {
						PF('camera').initialize();
					}
				}, 300);
			}
			
			function liberarCamara() {
				try {
					var video = document.querySelector('video');
					if (video && video.srcObject) {
						video.srcObject.getTracks().forEach(function(track) {
							track.stop();
						});
						video.srcObject = null;
					}
				} catch (e) {
					console.error('Error al liberar la cámara:', e);
				}
			}
			
			function capturarConOrientacion() {
				var video = document.querySelector('video');
				if (!video) {
					console.error('No se encontró el elemento video.');
					return;
				}
				
				// Leer dimensiones reales del stream en este momento
				var realWidth  = video.videoWidth;
				var realHeight = video.videoHeight;
				
				if (!realWidth || !realHeight) {
					console.error('El stream de video aún no tiene dimensiones.');
					return;
				}
				
				document.getElementById('form:realHeight').value = realHeight;
				document.getElementById('form:realWidth').value = realWidth;
				
				enviarInfoImagen();
				
				// Enviar al servidor usando el mecanismo de p:photoCam
				
				PF('camera').capture();
		    }
			//]]>
		</h:outputScript>
